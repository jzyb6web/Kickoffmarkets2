<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kick Off Markets — Footballer Share Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#C9A84C;--gold-light:#E2C27D;--gold-dim:#8C6F2F;
  --gold-bg:rgba(201,168,76,0.08);--gold-border:rgba(201,168,76,0.25);
  --black:#0A0A0A;--surface:#111111;--surface2:#181818;--surface3:#1F1F1F;
  --border:rgba(255,255,255,0.07);--border-gold:rgba(201,168,76,0.3);
  --text:#F5F5F0;--text-muted:rgba(245,245,240,0.5);--text-dim:rgba(245,245,240,0.28);
  --green:#2ECC8A;--green-dim:rgba(46,204,138,0.12);
  --red:#E05252;--red-dim:rgba(224,82,82,0.12);
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:6px;--radius-lg:10px;
}
html{font-size:14px;}
body{background:var(--black);color:var(--text);font-family:var(--font-body);min-height:100vh;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border-gold);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;border:1.5px solid var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:18px;height:18px;fill:var(--gold);}
.logo-wordmark{font-family:var(--font-display);font-size:1.15rem;letter-spacing:0.02em;}
.logo-wordmark .gold{color:var(--gold);}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.season-label{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);letter-spacing:0.08em;}
.matchday-pill{font-family:var(--font-mono);font-size:0.68rem;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:99px;padding:3px 10px;letter-spacing:0.06em;}
.live-pill{font-family:var(--font-mono);font-size:0.65rem;color:var(--green);background:rgba(46,204,138,0.1);border:1px solid rgba(46,204,138,0.3);border-radius:99px;padding:3px 10px;display:flex;align-items:center;gap:5px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

.ticker-wrap{background:var(--surface2);border-bottom:1px solid var(--border);overflow:hidden;height:30px;display:flex;align-items:center;}
.ticker-track{display:flex;gap:36px;animation:scroll-ticker 200s linear infinite;white-space:nowrap;padding:0 20px;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes scroll-ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.tick-item{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:0.68rem;}
.tick-name{color:var(--text-muted);}
.tick-price{color:var(--text);font-weight:500;}
.tick-chg{font-size:0.64rem;padding:1px 5px;border-radius:3px;}
.tick-up{color:var(--green);background:var(--green-dim);}
.tick-dn{color:var(--red);background:var(--red-dim);}
.tick-sep{color:rgba(255,255,255,0.1);font-size:0.6rem;}

.layout{max-width:1300px;margin:0 auto;padding:1.25rem 1.5rem;display:grid;grid-template-columns:1fr 350px;gap:1.25rem;}

.portfolio-strip{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-gold);border:1px solid var(--border-gold);border-radius:var(--radius-lg);overflow:hidden;}
.pstat{background:var(--surface);padding:0.85rem 1.2rem;}
.pstat-label{font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;}
.pstat-value{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--text);}
.pstat-value.up{color:var(--green);}.pstat-value.dn{color:var(--red);}
.pstat-sub{font-size:0.65rem;color:var(--text-muted);margin-top:2px;}

.left-panel{display:flex;flex-direction:column;gap:1rem;min-width:0;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:8px 18px;font-family:var(--font-body);font-size:0.75rem;font-weight:500;letter-spacing:0.05em;color:var(--text-muted);cursor:pointer;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;text-transform:uppercase;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-btn:hover:not(.active){color:var(--text);}

.market-controls{display:flex;flex-direction:column;gap:8px;}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:0.78rem;pointer-events:none;}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px 8px 30px;color:var(--text);font-family:var(--font-mono);font-size:0.74rem;outline:none;transition:border-color 0.15s;}
.search-input:focus{border-color:var(--gold-border);}
.search-input::placeholder{color:var(--text-dim);}
.league-bar{display:flex;gap:5px;flex-wrap:wrap;}
.lf-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);cursor:pointer;letter-spacing:0.04em;transition:all 0.12s;white-space:nowrap;}
.lf-btn.active{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold);}
.results-count{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-dim);padding:0 2px;}

.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;max-height:480px;overflow-y:auto;}
.market-grid::-webkit-scrollbar{width:3px;}.market-grid::-webkit-scrollbar-thumb{background:var(--border);}
.player-card{background:var(--surface);padding:0.85rem;cursor:pointer;transition:background 0.12s;position:relative;}
.player-card:hover{background:var(--surface2);}
.player-card.selected{background:var(--surface2);}
.player-card.selected::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);}
.pc-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.pc-avatar{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:0.68rem;font-weight:700;color:var(--gold);flex-shrink:0;background:var(--gold-bg);}
.pc-name{font-size:0.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-club{font-size:0.62rem;color:var(--text-muted);margin-top:1px;font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-pos{font-family:var(--font-mono);font-size:0.56rem;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);padding:1px 5px;border-radius:3px;flex-shrink:0;}
.pc-price-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;}
.pc-price{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text);}
.pc-chg{font-family:var(--font-mono);font-size:0.62rem;padding:2px 6px;border-radius:3px;font-weight:500;}
.pc-chg.up{color:var(--green);background:var(--green-dim);}.pc-chg.dn{color:var(--red);background:var(--red-dim);}
.pc-holdings{font-family:var(--font-mono);font-size:0.6rem;color:var(--gold-dim);margin-top:3px;}
.pc-league{font-family:var(--font-mono);font-size:0.56rem;color:var(--text-dim);margin-top:1px;}
.no-results{grid-column:1/-1;padding:3rem;text-align:center;font-family:var(--font-mono);font-size:0.72rem;color:var(--text-dim);}

.trade-panel{background:var(--surface);border:1px solid var(--border-gold);border-radius:var(--radius-lg);padding:1.1rem;}
.trade-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.8rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);}
.trade-player-name{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text);}
.chart-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.ctrl-grp{display:flex;gap:3px;}
.ctrl-btn{background:none;border:1px solid transparent;border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:0.64rem;color:var(--text-muted);cursor:pointer;letter-spacing:0.04em;transition:all 0.12s;}
.ctrl-btn.active{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold);}
.chart-box{background:var(--surface2);border-radius:var(--radius);padding:8px 6px;margin-bottom:0.85rem;overflow:hidden;}
.trade-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0.7rem;}
.trade-field label{display:block;font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
.trade-field input,.trade-field select{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;color:var(--text);font-family:var(--font-mono);font-size:0.76rem;outline:none;transition:border-color 0.15s;}
.trade-field input:focus,.trade-field select:focus{border-color:var(--gold-border);}
.trade-field select option{background:var(--surface3);}
.trade-cost-line{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);margin-bottom:0.7rem;padding:7px 10px;background:var(--surface2);border-radius:var(--radius);display:flex;justify-content:space-between;}
.trade-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-buy{background:var(--gold);color:var(--black);border:none;border-radius:var(--radius);padding:9px;font-family:var(--font-body);font-size:0.74rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;}
.btn-buy:hover{background:var(--gold-light);}
.btn-sell{background:transparent;color:var(--red);border:1px solid rgba(224,82,82,0.4);border-radius:var(--radius);padding:9px;font-family:var(--font-body);font-size:0.74rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;}
.btn-sell:hover{background:var(--red-dim);}
.empty-trade{text-align:center;padding:2.5rem;color:var(--text-dim);font-size:0.76rem;font-family:var(--font-mono);}
.empty-trade .icon{font-size:2rem;display:block;margin-bottom:0.5rem;opacity:0.25;}

.right-panel{display:flex;flex-direction:column;gap:1.25rem;}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:0.75rem;}
.section-title{font-family:var(--font-mono);font-size:0.62rem;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;}
.section-rule{flex:1;height:1px;background:var(--border);}

.news-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);}
.news-item{background:var(--surface);padding:0.8rem 0.9rem;display:flex;gap:10px;align-items:flex-start;}
.news-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.dot-goal{background:var(--green);}.dot-injury{background:var(--red);}.dot-transfer{background:var(--gold);}.dot-form{background:#A78BFA;}.dot-callup{background:#60A5FA;}
.news-body{flex:1;min-width:0;}
.news-type{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;}
.nt-goal{color:var(--green);}.nt-injury{color:var(--red);}.nt-transfer{color:var(--gold);}.nt-form{color:#A78BFA;}.nt-callup{color:#60A5FA;}
.news-text{font-size:0.76rem;color:var(--text);line-height:1.5;}
.news-impact{font-size:0.65rem;color:var(--text-muted);margin-top:3px;font-family:var(--font-mono);}
.news-player-tag{font-family:var(--font-mono);font-size:0.6rem;color:var(--gold-dim);margin-top:3px;}
.news-empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;text-align:center;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);}

.holdings-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);}
.holding{background:var(--surface);padding:0.8rem 0.9rem;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;}
.holding-name{font-size:0.8rem;font-weight:600;color:var(--text);}
.holding-meta{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);margin-top:2px;}
.holding-value{font-family:var(--font-display);font-size:0.9rem;font-weight:700;text-align:right;}
.holding-pnl{font-family:var(--font-mono);font-size:0.65rem;text-align:right;margin-top:2px;}
.txt-up{color:var(--green);}.txt-dn{color:var(--red);}
.holdings-empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;text-align:center;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface);border:1px solid var(--border-gold);border-radius:var(--radius);padding:9px 18px;font-family:var(--font-mono);font-size:0.72rem;color:var(--gold);opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── API SETTINGS ── */
.gear-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 9px;color:var(--text-muted);font-size:0.85rem;cursor:pointer;transition:all 0.15s;line-height:1;}
.gear-btn:hover{border-color:var(--gold-border);color:var(--gold);}
.gear-btn.api-active{border-color:var(--gold-border);color:var(--gold);background:var(--gold-bg);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border-gold);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:480px;}
.modal-title{font-family:var(--font-display);font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:0.3rem;}
.modal-sub{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);margin-bottom:1.2rem;line-height:1.6;}
.modal-label{font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;display:block;}
.modal-input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-family:var(--font-mono);font-size:0.76rem;outline:none;transition:border-color 0.15s;margin-bottom:1rem;}
.modal-input:focus{border-color:var(--gold-border);}
.modal-row{display:flex;gap:8px;}
.modal-btn-primary{flex:1;background:var(--gold);color:var(--black);border:none;border-radius:var(--radius);padding:9px;font-family:var(--font-body);font-size:0.74rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;}
.modal-btn-primary:hover{background:var(--gold-light);}
.modal-btn-secondary{background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius);padding:9px 16px;font-family:var(--font-body);font-size:0.74rem;cursor:pointer;}
.modal-btn-secondary:hover{border-color:var(--border-gold);color:var(--text);}
.modal-status{font-family:var(--font-mono);font-size:0.65rem;margin-top:0.75rem;padding:7px 10px;border-radius:var(--radius);display:none;}
.modal-status.ok{background:var(--green-dim);color:var(--green);display:block;}
.modal-status.err{background:var(--red-dim);color:var(--red);display:block;}
.api-source-badge{font-family:var(--font-mono);font-size:0.6rem;padding:2px 7px;border-radius:3px;margin-left:6px;}
.badge-live{background:rgba(46,204,138,0.15);color:var(--green);border:1px solid rgba(46,204,138,0.3);}
.badge-sim{background:var(--gold-bg);color:var(--gold-dim);border:1px solid var(--gold-border);}

@media(max-width:960px){.layout{grid-template-columns:1fr;}.right-panel{order:-1;}.portfolio-strip{grid-template-columns:1fr 1fr;}}
@media(max-width:540px){.market-grid{grid-template-columns:1fr;}.portfolio-strip{grid-template-columns:1fr 1fr;}.topbar-right .season-label{display:none;}}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 2c1.34 0 2.6.34 3.7.93L14 6.5l-2 1.5-2-1.5-1.7-1.57A7.94 7.94 0 0 1 12 4zm-6.93 5.3L7 10.5l-.5 3 2 1.5v2.5A7.96 7.96 0 0 1 4 12c0-1.02.19-1.99.52-2.9l.55.2zM12 20a7.96 7.96 0 0 1-4.5-1.38V16l2-1.5 1 .5 1-.5 2 1.5v2.62A7.96 7.96 0 0 1 12 20zm6.5-2.88V17.5l-.5-3 1.93-1.2.55-.2c.33.91.52 1.88.52 2.9 0 1.68-.52 3.24-1.41 4.52l-.07-.05zM17 10.5l1.93-1.2A8.02 8.02 0 0 0 15.7 5.43L14 6.5l-2-1.5-2 1.5-1.7-1.07A7.98 7.98 0 0 0 7 10.5l1 .5-.5 3 1.5 1 1-.5 1 .5 1.5-1-.5-3 1-.5z"/></svg>
    </div>
    <span class="logo-wordmark">Kick Off <span class="gold">Markets</span></span>
  </div>
  <div class="topbar-right">
    <span class="season-label">2025/26</span>
    <span id="save-badge" style="font-family:var(--font-mono);font-size:0.62rem;color:var(--green);transition:opacity 1s;opacity:0;white-space:nowrap;"></span>

    <span class="live-pill"><span class="live-dot"></span>LIVE</span>
    <span class="matchday-pill" id="matchday-pill">MD 36</span>
    <button class="gear-btn" onclick="resetProgress()" title="Reset Progress" style="font-size:0.65rem;padding:5px 8px;color:var(--text-dim)">↺ Reset</button>

  </div>
</header>

<!-- API key handled server-side via Netlify function -->

<div class="ticker-wrap"><div class="ticker-track" id="ticker-track"></div></div>

<main class="layout">
  <div class="portfolio-strip">
    <div class="pstat"><div class="pstat-label">Cash</div><div class="pstat-value" id="s-cash">$10,000</div><div class="pstat-sub">Available</div></div>
    <div class="pstat"><div class="pstat-label">Portfolio</div><div class="pstat-value" id="s-port">$0</div><div class="pstat-sub">Market value</div></div>
    <div class="pstat"><div class="pstat-label">Total</div><div class="pstat-value" id="s-total">$10,000</div><div class="pstat-sub">Cash + holdings</div></div>
    <div class="pstat"><div class="pstat-label">P&amp;L</div><div class="pstat-value" id="s-pnl">—</div><div class="pstat-sub">vs $10,000 start</div></div>
  </div>

  <div class="left-panel">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('market',this)">Market</button>
      <button class="tab-btn" onclick="switchTab('portfolio',this)">My Squad</button>
    </div>
    <div id="tab-market">
      <div class="market-controls">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" id="search-input" type="text" placeholder="Search player, club or position…" oninput="renderMarket()"/>
        </div>
        <div class="league-bar" id="league-bar"></div>
        <div class="results-count" id="results-count"></div>
      </div>
      <div class="market-grid" id="player-grid"></div>
      <div id="trade-area" style="margin-top:1rem"></div>
    </div>
    <div id="tab-portfolio" style="display:none">
      <div class="section-head" style="margin-top:0.25rem">
        <span class="section-title">Holdings</span><div class="section-rule"></div>
      </div>
      <div id="holdings-list"></div>
    </div>
  </div>

  <div class="right-panel">

// ── HISTORY GENERATION ──
function genCareerHistory(base, totalPts, vol, profile) {
  const shape = (profile && profile.shape) ? profile.shape : [0.7,0.8,0.88,0.94,0.98,1.00];
  const waypoints = shape.map(s => s * base);
  const a = [];
  for(let i = 0; i < totalPts; i++) {
    const t = i / (totalPts - 1);
    const wIdx = t * (waypoints.length - 1);
    const lo = Math.floor(wIdx), hi = Math.min(lo + 1, waypoints.length - 1);
    const frac = wIdx - lo;
    const target = waypoints[lo] * (1 - frac) + waypoints[hi] * frac;
    const prev = a.length > 0 ? a[a.length - 1] : target;
    const shock = (Math.random() - 0.5) * 2.2;
    const momentum = a.length > 1 ? (prev - a[a.length - 2]) * 0.25 : 0;
    const jump = Math.random() < 0.04 ? (Math.random() - 0.5) * vol * 5 : 0;
    const pull = (target - prev) * 0.08;
    a.push(Math.max(5, prev + pull + shock * vol + momentum + jump));
  }
  return a;
}

const TF_TOTAL_PTS = 300;
const TF_SLICES = { '5Y': 300, '1Y': 60, '3M': 30, '1M': 15, '1W': 10, '1D': 78 };

PLAYERS.forEach(p => {
  const vol = p.base * 0.012 * p.vol;
  const profile = CAREER_PROFILES[p.id];
  const full5Y = genCareerHistory(p.base, TF_TOTAL_PTS, vol, profile);
  fullHistory[p.id] = {};
  TIMEFRAMES.forEach(tf => {
    if(tf.key === '1D') {
      const dayVol = vol * 0.25;
      const lastPrice = full5Y.at(-1);
      const intraday = [lastPrice];
      for(let i = 1; i < 78; i++) {
        const prev = intraday[i-1];
        const drift = (Math.random() - 0.49) * dayVol * 0.4;
        const tick  = Math.random() < 0.06 ? (Math.random()-0.5)*dayVol*3 : 0;
        intraday.push(Math.max(5, prev + drift + tick));
      }
      fullHistory[p.id]['1D'] = intraday;
    } else {
      fullHistory[p.id][tf.key] = full5Y.slice(-TF_SLICES[tf.key]);
    }
  });
  prices[p.id] = fullHistory[p.id]['1D'].at(-1);
  shares[p.id] = 0;
  costBasis[p.id] = 0;
});

// ── MINI SPARKLINE ──
function miniSpark(id, w, h){
  const data=fullHistory[id]['1D'];
  if(data.length<2) return '';
  const min=Math.min(...data),max=Math.max(...data),rng=max-min||1;
  const pad=2,ch=h-pad*2;
  const pts=data.map((v,i)=>[(i/(data.length-1))*w, pad+ch-((v-min)/rng)*ch]);
  let d=`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for(let i=1;i<pts.length;i++){
    const p0=pts[Math.max(0,i-2)],p1=pts[i-1],p2=pts[i],p3=pts[Math.min(pts.length-1,i+1)];
    d+=` C ${(p1[0]+(p2[0]-p0[0])/6).toFixed(1)} ${(p1[1]+(p2[1]-p0[1])/6).toFixed(1)}, ${(p2[0]-(p3[0]-p1[0])/6).toFixed(1)} ${(p2[1]-(p3[1]-p1[1])/6).toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  const up=data.at(-1)>=data[0];
  const col=up?'#2ECC8A':'#E05252';
  const fill=up?'rgba(46,204,138,0.12)':'rgba(224,82,82,0.10)';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <path d="${d} L ${pts.at(-1)[0].toFixed(1)} ${h} L ${pts[0][0].toFixed(1)} ${h} Z" fill="${fill}"/>
    <path d="${d}" fill="none" stroke="${col}" stroke-width="1.4" stroke-linecap="round"/>
  </svg>`;
}

// ── FULL CHART ──
function fullChart(id, w, h, type, tf){
  const raw = fullHistory[id][tf];
  if(!raw||raw.length<2) return '';
  const padT=10,padB=18,padL=4,padR=4;
  const cw=w-padL-padR, ch=h-padT-padB;

  if(type==='line'){
    const min=Math.min(...raw)*0.997, max=Math.max(...raw)*1.003, rng=max-min||1;
    const yOf=v=>padT+ch-((v-min)/rng)*ch;
    const xOf=i=>padL+(i/(raw.length-1))*cw;
    const pts=raw.map((v,i)=>[xOf(i),yOf(v)]);
    let d=`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
    for(let i=1;i<pts.length;i++){
      const p0=pts[Math.max(0,i-2)],p1=pts[i-1],p2=pts[i],p3=pts[Math.min(pts.length-1,i+1)];
      d+=` C ${(p1[0]+(p2[0]-p0[0])/5).toFixed(1)} ${(p1[1]+(p2[1]-p0[1])/5).toFixed(1)}, ${(p2[0]-(p3[0]-p1[0])/5).toFixed(1)} ${(p2[1]-(p3[1]-p1[1])/5).toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
    }
    const up=raw.at(-1)>=raw[0];
    const col=up?'#2ECC8A':'#E05252';
    const fill=up?'rgba(46,204,138,0.10)':'rgba(224,82,82,0.09)';
    const [lx,ly]=[pts.at(-1)[0],pts.at(-1)[1]];
    const ylbls=[min,(min+max)/2,max].map(v=>({y:yOf(v),t:'$'+Math.round(v).toLocaleString()}));
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <path d="${d} L ${lx.toFixed(1)} ${padT+ch} L ${pts[0][0].toFixed(1)} ${padT+ch} Z" fill="${fill}"/>
      <path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round"/>
      <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3" fill="${col}"/>
      ${ylbls.map(l=>`<text x="${padL+2}" y="${l.y.toFixed(1)}" font-family="JetBrains Mono,monospace" font-size="7.5" fill="rgba(245,245,240,0.28)" dominant-baseline="middle">${l.t}</text>`).join('')}
    </svg>`;
  }

  if(type==='candle'){
    const barCount=Math.min(55,raw.length);
    const step=Math.max(1,Math.floor(raw.length/barCount));
    const bars=[];
    for(let i=0;i<raw.length-step;i+=step){
      const sl=raw.slice(i,i+step);
      const o=sl[0],c=sl.at(-1);
      const spread=(Math.abs(c-o)*0.5+Math.abs(c)*0.006);
      bars.push({o,c,h:Math.max(o,c)+spread*(0.4+Math.random()*0.9),l:Math.min(o,c)-spread*(0.4+Math.random()*0.9)});
    }
    const allV=bars.flatMap(b=>[b.h,b.l]);
    const min=Math.min(...allV)*0.997,max=Math.max(...allV)*1.003,rng=max-min||1;
    const yOf=v=>padT+ch-((v-min)/rng)*ch;
    const bw=Math.max(2,Math.floor(cw/bars.length*0.58));
    const gap=cw/bars.length;
    const ylbls=[min,(min+max)/2,max].map(v=>({y:yOf(v),t:'$'+Math.round(v).toLocaleString()}));
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      ${bars.map((b,i)=>{
        const cx=(padL+gap*i+gap/2).toFixed(1);
        const col=b.c>=b.o?'#2ECC8A':'#E05252';
        const top=yOf(Math.max(b.o,b.c)),bot=yOf(Math.min(b.o,b.c));
        const bh=Math.max(1.5,bot-top);
        return `<line x1="${cx}" y1="${yOf(b.h).toFixed(1)}" x2="${cx}" y2="${yOf(b.l).toFixed(1)}" stroke="${col}" stroke-width="1" opacity="0.65"/>
<rect x="${(parseFloat(cx)-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" fill="${col}" rx="1"/>`;
      }).join('')}
      ${ylbls.map(l=>`<text x="${padL+2}" y="${l.y.toFixed(1)}" font-family="JetBrains Mono,monospace" font-size="7.5" fill="rgba(245,245,240,0.28)" dominant-baseline="middle">${l.t}</text>`).join('')}
    </svg>`;
  }
  return '';
}

function updateCostLine(){
  if(!selected) return;
  const qty=parseInt(document.getElementById('t-qty').value)||1;
  document.getElementById('cost-line').innerHTML=`<span>Total cost: <strong>${fmt(qty*prices[selected])}</strong></span><span>Holdings: <strong>${shares[selected]}</strong> share${shares[selected]!==1?'s':''}</span>`;
}

function trade(dir){
  if(!selected) return;
  const qty = tradeQty;
  const p=PLAYERS.find(x=>x.id===selected);
  const cost=qty*prices[p.id];
  if(dir==='buy'){
    if(cash<cost){showToast('Insufficient cash for this order.');return;}
    cash-=cost; shares[p.id]+=qty; costBasis[p.id]+=cost;
    showToast(`Bought ${qty} share${qty>1?'s':''} of ${p.name}`);
  } else {
    if(shares[p.id]<qty){showToast("You don't hold enough shares.");return;}
    const proceeds=qty*prices[p.id];
    const avgCost=costBasis[p.id]/shares[p.id];
    cash+=proceeds; shares[p.id]-=qty; costBasis[p.id]=Math.max(0,costBasis[p.id]-avgCost*qty);
    showToast(`Sold ${qty} share${qty>1?'s':''} — ${fmt(Math.round(proceeds))} received`);
  }
  // Update stats + holdings badge on card without re-rendering whole trade panel
  updateStats();
  buildTicker();
  saveProgress(); // persist after every trade
  // Refresh just the player card holdings label and cost line
  const card = document.querySelector(`.player-card[onclick="selectPlayer('${selected}')"]`);
  if(card){
    const hEl = card.querySelector('.pc-holdings');
    if(shares[p.id]>0){
      if(hEl) hEl.textContent=`${shares[p.id]} share${shares[p.id]>1?'s':''} held`;
      else { const d=document.createElement('div'); d.className='pc-holdings'; d.textContent=`${shares[p.id]} share${shares[p.id]>1?'s':''} held`; card.appendChild(d); }
    } else { if(hEl) hEl.remove(); }
  }
  updateCostLine();
  if(activeTab==='portfolio') renderPortfolio();
}

//  PROGRESS SAVE / LOAD  — localStorage persistence
// ═══════════════════════════════════════════════════════════════
const SAVE_KEY = 'kom_save_v1';

function saveProgress(){
  try {
    const data = {
      cash,
      shares: Object.fromEntries(PLAYERS.map(p => [p.id, shares[p.id]])),
      costBasis: Object.fromEntries(PLAYERS.map(p => [p.id, costBasis[p.id]])),
      prices: Object.fromEntries(PLAYERS.map(p => [p.id, prices[p.id]])),
      savedAt: Date.now(),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) { console.warn('Save failed:', e); }
}

function loadProgress(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data || !data.shares) return false;

    cash = data.cash ?? 10000;
    PLAYERS.forEach(p => {
      if(data.shares[p.id] !== undefined)    shares[p.id]    = data.shares[p.id];
      if(data.costBasis[p.id] !== undefined) costBasis[p.id] = data.costBasis[p.id];
      // Restore saved price as starting point for today's chart
      if(data.prices[p.id] !== undefined){
        prices[p.id] = data.prices[p.id];
        // Patch the last point of 1D history so chart starts from saved price
        const hist = fullHistory[p.id]['1D'];
        hist[hist.length - 1] = prices[p.id];
      }
    });

    const age = Math.round((Date.now() - data.savedAt) / 60000);
    const ageStr = age < 60 ? `${age}m ago` : `${Math.round(age/60)}h ago`;
    showSaveBadge(`Progress restored · saved ${ageStr}`);
    return true;
  } catch(e) { console.warn('Load failed:', e); return false; }
}

function resetProgress(){
  if(!confirm('Reset all progress? This will clear your portfolio and restore $10,000 cash.')) return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

function showSaveBadge(msg){
  const el = document.getElementById('save-badge');
  if(!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 3500);
}

      <div>
        <div class="holding-value ${up?'txt-up':'txt-dn'}">${fmt(Math.round(val))}</div>
        <div class="holding-pnl ${up?'txt-up':'txt-dn'}">${up?'+':''}${fmt(Math.round(Math.abs(pnl)))} (${fmtPct(pct)})</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── NEWS RENDER ──
function renderNews(){
  const el=document.getElementById('news-panel');
  const items=[...newsLog].reverse().slice(0,20);
  if(!items.length){el.innerHTML=`<div class="news-empty">Awaiting first news event…</div>`;return;}
  el.innerHTML=`<div class="news-list">${items.map(n=>`<div class="news-item">
    <div class="news-dot ${DOT_CLASS[n.type]||'dot-form'}"></div>
    <div class="news-body">
      <div class="news-type ${TYPE_CLASS[n.type]||'nt-form'}">${TYPE_LABEL[n.type]||'📰 News'}</div>
      <div class="news-text">${n.text}</div>
      <div class="news-impact">${n.impact}</div>
      ${n.playerName?`<div class="news-player-tag">↳ ${n.playerName}</div>`:''}
    </div>
  </div>`).join('')}</div>`;
}

  'returns to training ahead of schedule',

const GOAL_CONTEXTS = [

];

  {text:'suspended for two games after accumulating five yellow cards', delta:-10, type:'injury'},
  {text:'appeal against red card dismissed — ban stands', delta:-12, type:'injury'},
];

const TRANSFER_RUMOURS = [
  {text:'linked with a summer move to {to} as negotiations open', factor:0.5},

  {text:'agrees personal terms with {to} — deal expected to be confirmed this week', factor:1.0},

];

  'called up to the national team squad for the upcoming internationals',

  'included in the extended squad for the Nations League campaign',

];

  {text:'reportedly seeking a transfer amid lack of playing time', delta:-5, type:'transfer'},
  {text:'loses his place in the starting XI to summer signing', delta:-7, type:'form'},
];

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randFee(min,max){ return Math.floor(Math.random()*(max-min)+min); }

function generateNewsEvent(){
  const p = rand(PLAYERS);
  const roll = Math.random();

  // ── GOAL (25%) ──
  if(roll < 0.25){
    const ctx = rand(GOAL_CONTEXTS);
    const opp = rand(OPPONENTS);
    const delta = 10 + Math.floor(Math.random()*8);
    return {
      text: `${p.full} ${ctx} ${opp}.`,
      impact: `+${delta}% market surge on match performance`,
      type: 'goal', playerName: p.name, pid: p.id, delta
    };
  }

  // ── INJURY (20%) ──
  if(roll < 0.45){
    const inj = rand(INJURY_TYPES);
    return {
      text: `${p.full} ruled out with a ${inj.label} — expected to miss ${inj.days}.`,
      impact: `${inj.delta}% sharp sell-off on injury news`,
      type: 'injury', playerName: p.name, pid: p.id, delta: inj.delta
    };
  }

  // ── RECOVERY (10%) ──
  if(roll < 0.55){
    const phrase = rand(RECOVERY_PHRASES);
    const delta = 6 + Math.floor(Math.random()*7);
    return {
      text: `${p.full} ${phrase} and is available for selection.`,
      impact: `+${delta}% recovery bounce`,
      type: 'form', playerName: p.name, pid: p.id, delta
    };
  }

  // ── TRANSFER (18%) ──
  if(roll < 0.73){
    // Pick a destination different from current club
    const allClubs = [...CLUBS_ELITE, ...CLUBS_TOP, ...CLUBS_MID].filter(c => c !== p.club);
    const toClub = rand(allClubs);
    const fromClub = p.club;
    const baseDelta = transferDelta(fromClub, toClub);
    const rumour = rand(TRANSFER_RUMOURS);
    const fee = randFee(20, 150);
    const text = rumour.text
      .replace('{to}', toClub)
      .replace('{from}', fromClub)
      .replace('{fee}', fee);
    const delta = Math.round(baseDelta * (0.7 + rumour.factor * 0.3));
    const impactLabel = delta > 0
      ? `+${delta}% on upgrade transfer speculation`
      : `${delta}% on downward move concerns`;
    return {
      text: `${p.full} ${text}.`,
      impact: impactLabel,
      type: 'transfer', playerName: p.name, pid: p.id, delta
    };
  }

  // ── NATIONAL TEAM CALL-UP (12%) ──
  if(roll < 0.85){
    const leagueNats = NATIONAL_TEAMS[p.league] || ['their national side'];
    const nat = rand(leagueNats);
    const phrase = rand(CALLUP_EVENTS);
    const delta = 4 + Math.floor(Math.random()*6);
    return {
      text: `${p.full} ${phrase} by ${nat}.`,
      impact: `+${delta}% on international recognition`,
      type: 'callup', playerName: p.name, pid: p.id, delta
    };
  }

  // ── FORM/AWARD (7%) ──
  if(roll < 0.92){
    const award = rand(AWARD_EVENTS);
    return {
      text: `${p.full} ${award.text}.`,
      impact: `+${award.delta}% form boost`,
      type: award.type, playerName: p.name, pid: p.id, delta: award.delta
    };
  }

  // ── SUSPENSION (4%) ──
  if(roll < 0.96){
    const susp = rand(SUSPENSION_EVENTS);
    return {
      text: `${p.full} ${susp.text}.`,
      impact: `${susp.delta}% on availability concern`,
      type: susp.type, playerName: p.name, pid: p.id, delta: susp.delta
    };
  }

  // ── DROPPING (4%) ──
  const drop = rand(DROPPING_EVENTS);
  return {
    text: `${p.full} ${drop.text}.`,
    impact: `${drop.delta}% on squad role uncertainty`,
    type: drop.type, playerName: p.name, pid: p.id, delta: drop.delta
  };
}

// ── APPLY A NEWS EVENT TO PRICES & UI ──
function applyNewsEvent(event){
  const pid = event.pid;
  const delta = event.delta;
  prices[pid] = Math.max(5, prices[pid] * (1 + delta / 100));
  fullHistory[pid]['1D'].push(prices[pid]);
  if(fullHistory[pid]['1D'].length > 150) fullHistory[pid]['1D'].shift();
  event.ts = Date.now();
  newsLog.push(event);
  if(newsLog.length > 60) newsLog.shift();
  if(shares[pid] > 0){
    showToast(`${delta>=0?'📈':'📉'} ${event.playerName}: ${delta>=0?'+':''}${delta}%`);
  }
  renderNews(); buildTicker(); updateStats();
  if(activeTab==='market') renderMarket();
  if(activeTab==='portfolio') renderPortfolio();
}

function fireFakeNews(){
  const event = generateNewsEvent();
  setNewsStatus('sim');
  applyNewsEvent(event);
}

// ═══════════════════════════════════════════════════════════════
//  CLAUDE API — LIVE FOOTBALL NEWS ENGINE
// ═══════════════════════════════════════════════════════════════
// API key lives server-side in Netlify function
let liveNewsFetchInterval = null;
let liveFetchIntervalMinutes = 8;
let isFetchingLive = false;
let lastLiveFetch = 0;

const PLAYER_ID_MAP = Object.fromEntries(PLAYERS.map(p => [p.full, p.id]));
const PLAYER_NAMES_STR = PLAYERS.map(p => p.full).join(', ');

async function fetchLiveNewsFromClaude(){
  if(isFetchingLive) return false;
  if(Date.now() - lastLiveFetch < 60000) return false;
  isFetchingLive = true;
  lastLiveFetch = Date.now();
  setNewsStatus('fetching');

  const picks = [...PLAYERS].sort(()=>Math.random()-0.5).slice(0,6).map(p=>p.full).join(', ');

  const systemPrompt = `You are a football market data analyst. Use web search to find the LATEST real news (past 48 hours) about these players: ${picks}.
Search for: goals, assists, injuries, transfer news, suspensions, national team call-ups, manager comments, form.

Return ONLY a raw JSON array — no markdown, no code fences. Schema:
[{"playerName":"exact full name","text":"one factual sentence","type":"goal|injury|transfer|form|callup","delta":-35 to 35,"impact":"e.g. +14% brace vs Arsenal"}]

Delta guide: goal scored=+12 to +18, brace=+18 to +25, injury=−10 to −35, transfer to elite club=+15 to +25, transfer down=−10 to −20, red card/suspension=−10 to −18, call-up=+4 to +10, award/form=+4 to +10.
Only report real news you found. playerName must exactly match one of: ${PLAYER_NAMES_STR}
Return 1–6 items max, or [] if nothing found. Start with [ end with ].`;

  try {
    const res = await fetch('/.netlify/functions/claude-proxy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1000,
        tools: [{type: 'web_search_20250305', name: 'web_search'}],
        system: systemPrompt,
        messages: [{role: 'user', content: 'Search for latest football news on those players and return the JSON array.'}]
      })
    });

    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      const msg = err?.error?.message || `HTTP ${res.status}`;
      console.warn('Claude API error:', msg);
      if(res.status === 401) showToast('API Error: Invalid API key in Netlify settings');
      else if(res.status === 429) setNewsStatus('rate-limited');
      else setNewsStatus('error');
      isFetchingLive = false; return false;
    }

    const data = await res.json();
    const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    const cleaned = textBlocks.replace(/```json|```/g, '').trim();
    const si = cleaned.indexOf('['), ei = cleaned.lastIndexOf(']');
    if(si === -1 || ei === -1){ isFetchingLive = false; setNewsStatus('live'); return true; }

    const items = JSON.parse(cleaned.slice(si, ei+1));
    if(!Array.isArray(items) || items.length === 0){ isFetchingLive = false; setNewsStatus('live'); return true; }

    let applied = 0;
    items.forEach(item => {
      const pid = PLAYER_ID_MAP[item.playerName];
      if(!pid) return;
      const delta = Math.max(-40, Math.min(40, parseInt(item.delta) || 0));
      applyNewsEvent({ text: item.text, impact: item.impact || `${delta>=0?'+':''}${delta}% on live news`,
        type: item.type || 'form', playerName: item.playerName, pid, delta, source: 'live' });
      applied++;
    });

    console.log(`✅ Live news: ${applied} events`);
    setNewsStatus('live');
    isFetchingLive = false;
    return true;
  } catch(e) {
    console.error('Live news error:', e);
    setNewsStatus('error');
    isFetchingLive = false;
    return false;
  }
}

function setNewsStatus(state){
  const el = document.getElementById('news-status');

  const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  if(state === 'live'){
    el.textContent = `live · ${t}`; el.style.color = 'var(--green)';

  } else if(state === 'fetching'){
    el.textContent = 'fetching live news…'; el.style.color = 'var(--text-dim)';
  } else if(state === 'sim'){
    el.textContent = `sim · ${t}`; el.style.color = 'var(--text-dim)';

  } else if(state === 'rate-limited'){
    el.textContent = 'rate limited — retrying later'; el.style.color = 'var(--red)';
  } else {
    el.textContent = `error · ${t}`; el.style.color = 'var(--red)';
  }
}

async function runNewsEvent(){
  const ok = await fetchLiveNewsFromClaude();
  if(!ok) fireFakeNews();
}

function marketNoise(){
  PLAYERS.forEach(p=>{
    const vol=p.base*0.008*p.vol;
    const drift=(Math.random()-0.48)*vol;
    prices[p.id]=Math.max(5,prices[p.id]+drift);
    fullHistory[p.id]['1D'].push(prices[p.id]);
    if(fullHistory[p.id]['1D'].length>150) fullHistory[p.id]['1D'].shift();
  });
  buildTicker(); updateStats();
  if(activeTab==='market') renderMarket();
  if(activeTab==='portfolio') renderPortfolio();
}
